name: Build plugin

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Publish
        run: dotnet publish -c Release -o "${{ github.workspace }}/out"

      - name: Zip for Jellyfin catalog (Linux zip — MD5 may differ from Windows)
        run: |
          cd out
          zip -q ../DebridStream_1.2.0.1.zip Jellyfin.Plugin.DebridStream.dll meta.json
          cd ..
          echo "MD5 of DebridStream_1.2.0.1.zip (for manifest 1.2.0.1 entry or release workflow):"
          md5sum DebridStream_1.2.0.1.zip

      - name: Upload artifact (dll + meta)
        uses: actions/upload-artifact@v4
        with:
          name: jellyfin-plugin-debrid-stream
          path: |
            out/Jellyfin.Plugin.DebridStream.dll
            out/meta.json

      - name: Upload artifact (catalog zip)
        uses: actions/upload-artifact@v4
        with:
          name: DebridStream_1.2.0.1.zip
          path: DebridStream_1.2.0.1.zip
