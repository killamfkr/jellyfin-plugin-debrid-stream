# Run manually: Actions → "Publish plugin release" → Run workflow
# Builds DebridStream_{PLUGIN_VER}.zip, updates manifest checksum for that version, pushes main, creates tag + release.

name: Publish plugin release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-plugin
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      PLUGIN_VER: "1.2.0.1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Publish
        run: dotnet publish -c Release -o "${{ github.workspace }}/out"

      - name: Build zip
        run: |
          cd out
          zip -q "../DebridStream_${PLUGIN_VER}.zip" Jellyfin.Plugin.DebridStream.dll meta.json
          cd ..
          md5sum "DebridStream_${PLUGIN_VER}.zip"

      - name: Update manifest.json checksum (version ${{ env.PLUGIN_VER }})
        run: |
          NEW=$(md5sum "DebridStream_${PLUGIN_VER}.zip" | awk '{print $1}')
          echo "New checksum for ${PLUGIN_VER}: $NEW"
          jq --arg c "$NEW" --arg v "${PLUGIN_VER}" \
            '(.[0].versions |= map(if .version == $v then .checksum = $c else . end))' manifest.json > manifest.tmp
          mv manifest.tmp manifest.json
          grep -A1 "\"version\": \"${PLUGIN_VER}\"" manifest.json

      - name: Commit manifest if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          if git diff --staged --quiet; then
            echo "No manifest change"
          else
            git commit -m "chore: sync manifest checksum for v${PLUGIN_VER} release"
            git push origin main
          fi

      - name: Create release and upload zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.PLUGIN_VER }}
          name: v${{ env.PLUGIN_VER }} — Debrid / Stremio streams
          body: |
            Jellyfin plugin package: `DebridStream_${{ env.PLUGIN_VER }}.zip` (dll + meta.json).

            **1.2.0.1:** Stream discovery TMDB key on-page + clearer setup messages.  
            **1.2.0.0:** dashboard discovery (TMDB), REST API, per-stream library sources, TMDB/TVDB→IMDb, cache.

            Catalog URL: `https://raw.githubusercontent.com/killamfkr/jellyfin-plugin-debrid-stream/main/manifest.json`
          files: DebridStream_${{ env.PLUGIN_VER }}.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
